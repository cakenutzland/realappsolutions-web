kind = "web"
previewPath = "/"
title = "Business Website"
version = "1.0.0"
id = "artifacts/business-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19742
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/business-website run dev"

[services.env]
PORT = "19742"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/business-website", "run", "build"]
publicDir = "artifacts/business-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
